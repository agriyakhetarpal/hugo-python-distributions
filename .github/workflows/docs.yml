name: Docs

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 3

permissions: {}

jobs:
  build:
    name: documentation-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          submodules: "recursive"

      - name: Get Go version from pyproject.toml
        id: go-version
        shell: python
        run: |
          import re, os
          version = re.search(r'go-bin==([0-9.]+)', open('pyproject.toml').read()).group(1)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'version={version}\n')

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.14"
          activate-environment: true

      - name: Restore Hugo builder cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ./hugo_cache/
          key: ubuntu-latest-hugo-${{ steps.go-version.outputs.version }}

      - name: Install Python dependencies
        run: uv pip install nox

      - name: Build documentation website
        run: nox -s docs

      - name: Upload documentation as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docs
          path: docs/public/

  deploy:
    name: documentation-deploy
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write # Required for pushing to gh-pages branch
    steps:
      - name: Download documentation artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs
          path: docs/public/

      - name: Deploy documentation website
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/public/
          publish_branch: gh-pages
          keep_files: false
          force_orphan: true
