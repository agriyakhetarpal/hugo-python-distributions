          path: ./wheelhouse/*.whl
          if-no-files-found: error

  macos_amd64_wheels:
    name: amd64-macos
    runs-on: macos-15-intel
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.1"
          cache: false
          check-latest: true

      - uses: pypa/cibuildwheel@ee02a1537ce3071a004a6b08c41e72f0fdc42d9a # v3.4.0
        with:
          package-dir: .
          output-dir: wheelhouse
        env:
          CIBW_ARCHS_MACOS: x86_64
          CIBW_TEST_COMMAND: |
            hugo version
            hugo env --logLevel debug

      - name: Upload wheels
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels_macos_x86_64
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  macos_arm64_wheels:
    name: arm64-macos
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.1"
          cache: false
          check-latest: true

      - uses: pypa/cibuildwheel@ee02a1537ce3071a004a6b08c41e72f0fdc42d9a # v3.4.0
        with:
          package-dir: .
          output-dir: wheelhouse
        env:
          CIBW_ARCHS_MACOS: arm64
          CIBW_TEST_COMMAND: |
            hugo version
            hugo env --logLevel debug

      - name: Upload wheels
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels_macos_arm64
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  publish:
    needs:
      [
        sdist,
        windows_amd64_wheels,
        windows_arm64_wheels,
        windows_i686_wheels,
        macos_amd64_wheels,
        macos_arm64_wheels,
        linux_amd64_wheels,
        linux_arm64_wheels,
        linux_s390x_wheels,
        linux_ppc64le_wheels,
      ]

    name: Publish to PyPI or TestPyPI
    environment: release
    permissions:
      id-token: write # Required by OIDC to publish to PyPI and by Sigstore to sign artifacts
      contents: write # Required to upload signed artifacts to a GitHub release
      attestations: write # Required to generate build provenance attestations
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && github.event_name != 'schedule'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: upload/
          merge-multiple: true

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # Select template based on whether this is a patch release
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          if [ "$PATCH" -gt 0 ]; then
            TEMPLATE="release_notes/patch.md"
          else
            TEMPLATE="release_notes/stable.md"
          fi

          # Find the previous tag
          PREVIOUS_TAG=$(git tag --sort=-v:refname | \
            awk -v tag="${TAG}" '$0 == tag {found=1; next} found {print; exit}')
          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${TAG}^")
          fi

          # Extract PR numbers from commits between the two tags
          PR_NUMBERS=$(git log "${PREVIOUS_TAG}..${TAG}" --oneline | \
            grep -oE '#[0-9]+' | tr -d '#' || true)

          # Fetch PR titles and authors, filtering out bot PRs
          PR_LINES=""
          for NUM in $PR_NUMBERS; do
            LINE=$(gh pr view "$NUM" --repo "${GITHUB_REPOSITORY}" --json title,author \
              --jq '"- \(.title) by @\(.author.login) in #'"$NUM"'"' 2>/dev/null || true)
            [ -z "$LINE" ] && continue
            echo "$LINE" | grep -qE 'dependabot\[bot\]|pre-commit-ci\[bot\]' && continue
            PR_LINES="${PR_LINES}${LINE}"$'\n'
          done

          if [ -n "$PR_LINES" ]; then
            CHANGES_SECTION=$'\n## Changes that made it to this release\n\n'"${PR_LINES}"
          else
            CHANGES_SECTION=""
          fi

          export VERSION PREVIOUS_TAG CHANGES_SECTION
          envsubst '${VERSION} ${PREVIOUS_TAG} ${CHANGES_SECTION}' \
            < "$TEMPLATE" > /tmp/release-notes.md

      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          # Comment this line out to publish to PyPI
          # repository-url: https://test.pypi.org/legacy/
          packages-dir: upload

      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@a5caf349bc536fbef3668a10ed7f5cd309a4b53d # v3.2.0
        with:
          inputs: >-
            ./upload/*.whl
            ./upload/*.tar.gz

      - name: Generate artifact attestation(s)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            upload/*.whl
            upload/*.tar.gz

      - name: Create GitHub Release and upload artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" upload/* \
            --title "${GITHUB_REF_NAME}" \
            --notes-file /tmp/release-notes.md
