ci:
  autoupdate_commit_msg: "📈 Update versions for pre-commit hooks"
  autofix_commit_msg: "🪩 Automated fixes from https://pre-commit.ci"
  autoupdate_schedule: "weekly"
  autofix_prs: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "3e8a8703264a2f4a69428a0aa4dcb512790b2c8c" # frozen: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-yaml
      - id: debug-statements
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "c59bba8fb259db0fec2bbb77ad8ba51ea7341b56"  # frozen: v0.15.20
    hooks:
      - id: ruff-check
        args: ["--fix", "--show-fixes"]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/asottile/pyupgrade
    rev: "75992aaa40730136014f34227e0135f63fc951b4" # frozen: v3.21.2
    hooks:
      - id: pyupgrade

  - repo: https://github.com/codespell-project/codespell
    rev: "2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a" # frozen: v2.4.2
    hooks:
      - id: codespell
        args: ["--skip=CODE_OF_CONDUCT.md"]

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: "4923370d55631aa5b66f612f52d67b2e0ca2a38c"  # frozen: v3.9.1
    hooks:
      - id: prettier
        files: \.(html|md|toml|yml|yaml)
        args: [--prose-wrap=preserve]

  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: "e3eebf65325ccc992422292cb7a4baee967cf815" # frozen: v1.26.1
    hooks:
      - id: zizmor
        args: ["--pedantic"]
